name: Generate Kindle Life OS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *" # daily at 10:00 UTC
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Markdown dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_AREAS_DB_ID: ${{ secrets.NOTION_AREAS_DB_ID }}
          NOTION_GOALS_DB_ID: ${{ secrets.NOTION_GOALS_DB_ID }}
          NOTION_ACTIONS_DB_ID: ${{ secrets.NOTION_ACTIONS_DB_ID }}
          NOTION_RESOURCES_DB_ID: ${{ secrets.NOTION_RESOURCES_DB_ID }}
          NOTION_WORKOUTS_DB_ID: ${{ secrets.NOTION_WORKOUTS_DB_ID }}
          NOTION_FINANCE_DB_ID: ${{ secrets.NOTION_FINANCE_DB_ID }}
          NOTION_READING_DB_ID: ${{ secrets.NOTION_READING_DB_ID }}
          OUTPUT_DIR: kindle
          TZ: America/New_York
          STRICT_DATABASES: "false"
        run: python generate_dashboard.py

      - name: Commit generated Kindle pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Kindle Life OS markdown"
          file_pattern: "kindle/**/*.md kindle/*.md"
